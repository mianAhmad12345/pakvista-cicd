<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Lahore - The Heart of Pakistan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero-section">
        <div class="hero-overlay">
            <h1>Welcome to Lahore</h1>
            <p>The cultural capital, rich history, vibrant food, and endless life.</p>
            <button class="cta-btn" onclick="generateFact()">Reveal a Fun Fact!</button>
            <p id="fact-display" class="fact-text"></p>
        </div>
    </header>

    <main class="container">
        
        <section class="interactive-poll">
            <h2>Cast Your Vote: What's your ultimate Lahore vibe?</h2>
            <div class="poll-buttons">
                <button onclick="castLocalVote('Food')">🍔 The Food (Gawalmandi / MM Alam)</button>
                <button onclick="castLocalVote('History')">🕌 The History (Walled City / Badshahi)</button>
                <button onclick="castLocalVote('Cricket')">🏏 The Cricket (Gaddafi Stadium)</button>
            </div>
            <div id="poll-feedback" class="poll-result"></div>
        </section>

        <hr>

        <section class="gallery-section">
            <h2>Must-Visit Historical Landmarks</h2>
            <div class="card-grid">
                
                <figure class="landmark-card">
                    <img src="https://images.unsplash.com/photo-1627915726244-933e4d9c7cb3?auto=format&fit=crop&w=600&q=80" alt="Badshahi Mosque Lahore">
                    <figcaption>
                        <h3>Badshahi Mosque</h3>
                        <p>Commissioned by Emperor Aurangzeb in 1671, this iconic masterpiece represents the pinnacle of Mughal architectural beauty and grandeur.</p>
                    </figcaption>
                </figure>

                <figure class="landmark-card">
                    <img src="https://images.unsplash.com/photo-1622547748225-3fc4abd2cca0?auto=format&fit=crop&w=600&q=80" alt="Lahore Fort Shahi Qila">
                    <figcaption>
                        <h3>The Shahi Qila</h3>
                        <p>A sprawling citadel containing the gorgeous Sheesh Mahal (Palace of Mirrors), packed with centuries of royal history.</p>
                    </figcaption>
                </figure>

                <figure class="landmark-card">
                    <img src="https://images.unsplash.com/photo-1599925232817-47b1c3fa6db7?auto=format&fit=crop&w=600&q=80" alt="Minar e Pakistan">
                    <figcaption>
                        <h3>Minar-e-Pakistan</h3>
                        <p>The historic tower standing tall in Iqbal Park, marking the exact site where the Pakistan Resolution was passed in 1940.</p>
                    </figcaption>
                </figure>

            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PakVista DevOps Team Project. All Rights Reserved.</p>
    </footer>

    <script>
        const facts = [
            "Lahore is famously known as 'Zinda Dilon Ka Shaher' (The City of Lively Hearts)!",
            "The Walled City of Lahore originally had 13 historic entry gates.",
            "The Lahore Fort's Picture Wall is one of the largest mural walls in the entire world!",
            "Lahore's local food street in Anarkali is one of the oldest continuously operating food hubs in South Asia."
        ];

        function generateFact() {
            const randomIndex = Math.floor(Math.random() * facts.length);
            const display = document.getElementById("fact-display");
            display.innerText = facts[randomIndex];
        }

        function castLocalVote(vibe) {
            const feedback = document.getElementById("poll-feedback");
            feedback.innerHTML = `🎉 Awesome! You voted for <strong>${vibe}</strong>. Lahore definitely rules in that department!`;
        }
    </script>
</body>
</html>
