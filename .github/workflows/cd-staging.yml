name: CD - Staging
on:
  push:
    branches: [ staging ]
jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Webhook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}
      - name: Deployment Log
        run: echo "Deployment to Staging Environment triggered at $(date)"
