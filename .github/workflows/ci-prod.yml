name: CI Production Pipeline

on:
  push:
    branches: [ "main", "feature/ahmad/advanced-styling" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Docker Buildx (highly recommended for reliable builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build the Docker Image locally to catch environment crashes
      - name: Build Local Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: pakvista:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      # Step 4: Trigger Render Deployment (Only runs when code safely lands on main)
      - name: Trigger Render Deploy Webhook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "Render Deploy Hook secret is missing. Skipping webhook trigger."
            echo "Render will still auto-deploy if connected directly to the repository."
          else
            curl -X GET "$RENDER_DEPLOY_HOOK"
          fi
