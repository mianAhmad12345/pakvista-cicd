name: CD - Development
on:
  push:
    branches: [ develop ]
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Render Webhook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_DEV_URL }}
      - name: Deployment Log
        run: echo "Deployment to Development Environment triggered at $(date)"
