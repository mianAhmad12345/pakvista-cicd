name: Development CI Pipeline

on:
  push:
    branches:
      - 'feature/ahmad/*'
      - develop
  pull_request:
    branches:
      - develop

jobs:
  dev-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sanitize Workspace Windows Metadata
        run: |
          find . -name "*:Zone.Identifier" -delete
          echo "Workspace sanitized for Dev environment."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Dev Container
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: pakvista-portal:dev
